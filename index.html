<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>FISH</title>

</head>

<body>
    <div class="container biggest ipad-biggest nh-biggest">
        <div class="container colomn main1 ipad-main nh-main1">
            <div class="container mobile-colomn">

                    <div class="card shop colomn-card">
                        <div class="text">магазин <br>рыбок</div>
                    </div>
                    <div class="card humor">
                        <div class="text">юмора нет</div>
                    </div>
                </div>
                <div class="container colomn right mobile-width">
                    <div class="container little">
                        <div class="card full-width colomn-card jc">
                            <div class="text">это вау<br>это нечто</div>

                        </div>

                        </div>
                    </div>

                        <div class="text">забывчивые рыбки</div>

                </div>
            </div>
            <div class="container little">
                <div class="card vybor">
                    <div class="text">выбери,<br>какая рыбка<br>ты сегодня</div>
                </div>
                <div class="card memory">
                    <div class="text">микро-<br>память</div>
                </div>
            </div>
        </div>
        <div class="container colomn main2 ipad-main">
            <div class="card obraz ipad-height ipad-obraz mobile-obraz">
                <div class="text">выразительные<br>образы</div>
            </div>

                <div class="text">попузырься</div>
            </div>
        </div>
