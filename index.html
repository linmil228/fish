<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css">
    <title>FISH</title>
  </head>
  <body>
    <div class="container tablet-column">
      <div
        class="container column width-75 tablet-width-full mobile-height-fit"
      >
        <div class="container height-75 mobile-column mobile-height-fit">
          <div class="container column width-1-3 mobile-width-full">
            <div class="container card column height-2-3">
              <p>магазин<br>рыбок</p>
              <img src="pic/shop.png">
            </div>
            <div class="container card column height-1-3">
              <p>юмора нет</p>
              <img src="pic/humor.png">
            </div>
          </div>
          <div class="container column width-2-3 mobile-width-full">
            <div class="container">
              <div class="container card column">
                <p>это вау<br>это нечто</p>
                <p class="gray">really??</p>
              </div>
              <div class="container card column gradient">
                <p>купи рыбу<br>СРОЧНО!</p>
                <img src="pic/buy.png">
              </div>
            </div>
            <div class="container card column big">
              <p>забывчивые рыбки</p>
              <img src="pic/mainfish.png">
            </div>
          </div>
        </div>
        <div class="container height-25">
          <div class="container card width-2-3 gradient">
            <p>выбери,<br>какая&nbsp;рыбка<br>ты сегодня</p>
            <img src="pic/vybor.png">
          </div>
          <div class="container card width-1-3">
            <p>микро-<br>память</p>
            <img src="pic/memory.png">
          </div>
        </div>
      </div>
      <div class="container column width-25 tablet-width-full">
        <div class="container card column">
          <p>выразительные<br>образы</p>
          <img src="pic/obraz.png">
        </div>
        <div class="container card column gradient">
          <p>попузырься</p>
          <img src="pic/bubbles.png">
        </div>
      </div>
    </div>
  </body>
</html>
